<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETH/USDT - TradingView</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1e222d;
            --bg-secondary: #2a3040;
            --bg-tertiary: #333a4a;
            --bg-chart: #131722;
            --border-color: #333a4a;
            --text-primary: #d1d5db;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-green: #26a69a;
            --accent-red: #ef5350;
            --accent-blue: #58a6ff;
            --accent-yellow: #f59e0b;
            --hover-bg: #2a3040;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .logo-btn:hover {
            background: var(--hover-bg);
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-blue);
            letter-spacing: 0.5px;
        }

        .search-bar {
            flex: 1;
            max-width: 300px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 6px 28px 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-blue);
        }

        .search-icon {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        .symbol-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 12px;
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        .symbol-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .symbol-separator {
            width: 1px;
            height: 14px;
            background: var(--border-color);
        }

        .price-display {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .current-price {
            font-size: 20px;
            font-weight: 700;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            color: var(--accent-green);
            letter-spacing: -0.5px;
        }

        .price-change {
            font-size: 12px;
            color: var(--accent-green);
            font-weight: 500;
        }

        .price-change.negative {
            color: var(--accent-red);
        }

        .header-center {
            display: flex;
            align-items: center;
            gap: 2px;
            background: var(--bg-tertiary);
            padding: 2px;
            border-radius: 4px;
        }

        .timeframe-btn {
            padding: 5px 14px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .timeframe-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .timeframe-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .tool-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: all 0.15s;
        }

        .tool-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .tool-btn.active {
            background: var(--hover-bg);
            color: var(--accent-blue);
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .left-panel {
            width: 40px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .panel-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.15s;
        }

        .panel-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .panel-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        .panel-divider {
            height: 1px;
            background: var(--border-color);
            margin: 8px 0;
        }

        .chart-container {
            flex: 1;
            background: var(--bg-chart);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: rgba(42, 48, 64, 0.8);
            border-bottom: 1px solid var(--border-color);
        }

        .chart-title {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .chart-actions {
            display: flex;
            gap: 4px;
        }

        .mini-btn {
            padding: 4px 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .mini-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        #chart {
            flex: 1;
            width: 100%;
            min-height: 500px;
        }

        .crosshair-info {
            position: absolute;
            top: 40px;
            right: 12px;
            background: rgba(30, 34, 45, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 11px;
            font-family: 'Consolas', 'Monaco', monospace;
            z-index: 20;
            display: none;
        }

        .crosshair-info.active {
            display: block;
        }

        .crosshair-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 4px;
        }

        .crosshair-row:last-child {
            margin-bottom: 0;
        }

        .crosshair-label {
            color: var(--text-muted);
        }

        .crosshair-value {
            color: var(--text-primary);
        }

        .crosshair-value.up {
            color: var(--accent-green);
        }

        .crosshair-value.down {
            color: var(--accent-red);
        }

        .footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 4px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .range-btn {
            padding: 4px 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.15s;
        }

        .range-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .range-btn.active {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .footer-center {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .playback-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .playback-btn {
            width: 26px;
            height: 26px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all 0.15s;
        }

        .playback-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .playback-btn.playing {
            color: var(--accent-green);
        }

        .speed-select {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            outline: none;
        }

        .speed-select:hover {
            color: var(--text-primary);
        }

        .speed-select:focus {
            border-color: var(--accent-blue);
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .date-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-selector label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .date-selector input {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            outline: none;
        }

        .date-selector input:focus {
            border-color: var(--accent-blue);
        }

        .date-selector button {
            padding: 4px 10px;
            border: none;
            background: var(--accent-blue);
            color: white;
            font-size: 11px;
            cursor: pointer;
            border-radius: 3px;
        }

        .date-selector button:hover {
            opacity: 0.9;
        }

        .data-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-green);
        }

        .status-dot.loading {
            background: var(--accent-yellow);
            animation: pulse 1.5s infinite;
        }

        .status-dot.error {
            background: var(--accent-red);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .time-display {
            font-family: 'Consolas', 'Monaco', monospace;
            color: var(--text-secondary);
        }

        .stats-panel {
            width: 220px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            padding: 12px;
            overflow-y: auto;
        }

        .stats-section {
            margin-bottom: 16px;
        }

        .stats-title {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(51, 58, 74, 0.5);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-secondary);
        }

        .stat-value {
            color: var(--text-primary);
            font-family: 'Consolas', 'Monaco', monospace;
            font-weight: 500;
        }

        .stat-value.positive {
            color: var(--accent-green);
        }

        .stat-value.negative {
            color: var(--accent-red);
        }

        .separator {
            height: 1px;
            background: var(--border-color);
            margin: 12px 0;
        }

        .indicators-panel {
            margin-top: 16px;
        }

        .indicator-btn {
            width: 100%;
            padding: 6px 8px;
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            border-radius: 3px;
            margin-bottom: 4px;
            text-align: left;
            transition: all 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .indicator-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .indicator-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        .mobile-menu-btn {
            display: none;
        }

        @media (max-width: 1024px) {
            .stats-panel {
                width: 180px;
            }

            .search-bar {
                max-width: 200px;
            }
        }

        @media (max-width: 768px) {
            .stats-panel {
                display: none;
            }

            .timeframe-btn {
                padding: 4px 8px;
                font-size: 10px;
            }

            .header-right {
                display: none;
            }

            .search-bar {
                display: none;
            }

            .mobile-menu-btn {
                display: flex;
            }

            .symbol-info {
                padding: 4px 8px;
            }

            .current-price {
                font-size: 16px;
            }
        }
        
        /* 价格轴设置面板样式 */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(51, 58, 74, 0.5);
        }
        
        .setting-row:last-child {
            border-bottom: none;
        }
        
        .setting-label {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        .setting-select {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            outline: none;
        }
        
        .setting-select:hover {
            border-color: var(--accent-blue);
        }
        
        .setting-range {
            width: 100px;
            margin: 0 8px;
            cursor: pointer;
        }
        
        .setting-value {
            font-size: 11px;
            color: var(--text-primary);
            font-family: 'Consolas', 'Monaco', monospace;
            min-width: 35px;
            text-align: right;
        }
        
        /* 切换开关样式 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-tertiary);
            transition: 0.3s;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: var(--text-muted);
            transition: 0.3s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(20px);
            background-color: white;
        }
        
        /* 绘图右键菜单样式 */
        .menu-item {
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 13px;
        }
        
        .menu-item:hover {
            background: #3a4050;
        }
        
        .delete-item:hover {
            background: rgba(239, 83, 80, 0.2);
            color: #ef5350;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
                <div class="logo-section">
                    <div class="logo">TradingView</div>
                </div>
                <div class="symbol-info">
                    <span class="symbol-name">ETH/USDT</span>
                    <span class="symbol-separator"></span>
                    <div class="price-display">
                        <span class="current-price" id="current-price">$0.00</span>
                        <span class="price-change" id="price-change">+0.00%</span>
                    </div>
                </div>
            </div>

            <div class="header-center">
                <button class="timeframe-btn active" data-interval="15m">15m</button>
                <button class="timeframe-btn" data-interval="1h">1h</button>
                <button class="timeframe-btn" data-interval="4h">4h</button>
                <button class="timeframe-btn" data-interval="1d">1d</button>
            </div>

            <div class="header-right">
                <button class="tool-btn" id="btn-add-marker" title="添加标记点">📍</button>
                <button class="tool-btn" id="btn-add-priceline" title="添加价格线">—</button>
                <button class="tool-btn" id="btn-draw-rectangle" title="绘制矩形">▢</button>
                <button class="tool-btn" id="btn-draw-trendline" title="绘制趋势线">↗</button>
                <button class="tool-btn" id="btn-draw-fibonacci" title="绘制斐波那契">∅</button>
                <button class="tool-btn" id="btn-clear-drawings" title="清除所有绘图">🗑️</button>
            </div>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <button class="panel-btn active" title="图表">📈</button>
        </div>

        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">ETH/USDT · Binance · 15分钟</div>
                <div class="chart-actions">
                    <button class="mini-btn" id="zoom-in">+ 放大</button>
                    <button class="mini-btn" id="zoom-out">− 缩小</button>
                    <button class="mini-btn" id="reset-view">↺ 重置</button>
                    <button class="mini-btn active" id="toggle-auto-scale">📐 自动</button>
                    <button class="mini-btn">TradingView</button>
                    <button class="mini-btn">Binance</button>
                </div>
            </div>

            <div id="chart"></div>
            <div class="crosshair-info" id="crosshair-info">
                <div class="crosshair-row">
                    <span class="crosshair-label">时间</span>
                    <span class="crosshair-value" id="crosshair-time">--:--:--</span>
                </div>
                <div class="crosshair-row">
                    <span class="crosshair-label">开盘</span>
                    <span class="crosshair-value" id="crosshair-open">$0.00</span>
                </div>
                <div class="crosshair-row">
                    <span class="crosshair-label">最高</span>
                    <span class="crosshair-value" id="crosshair-high">$0.00</span>
                </div>
                <div class="crosshair-row">
                    <span class="crosshair-label">最低</span>
                    <span class="crosshair-value" id="crosshair-low">$0.00</span>
                </div>
                <div class="crosshair-row">
                    <span class="crosshair-label">收盘</span>
                    <span class="crosshair-value" id="crosshair-close">$0.00</span>
                </div>
                <div class="crosshair-row">
                    <span class="crosshair-label">成交量</span>
                    <span class="crosshair-value" id="crosshair-volume">0</span>
                </div>
            </div>
        </div>

        <div class="stats-panel">
            <div class="stats-section">
                <div class="stats-title">行情数据</div>
                <div class="stat-row">
                    <span class="stat-label">开盘</span>
                    <span class="stat-value" id="stat-open">$0.00</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">最高</span>
                    <span class="stat-value" id="stat-high">$0.00</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">最低</span>
                    <span class="stat-value" id="stat-low">$0.00</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">收盘</span>
                    <span class="stat-value" id="stat-close">$0.00</span>
                </div>
            </div>

            <div class="separator"></div>

            <div class="stats-section">
                <div class="stats-title">24小时</div>
                <div class="stat-row">
                    <span class="stat-label">最高</span>
                    <span class="stat-value" id="stat-high24">$0.00</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">最低</span>
                    <span class="stat-value" id="stat-low24">$0.00</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">成交量</span>
                    <span class="stat-value" id="stat-volume">0 ETH</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">涨跌幅</span>
                    <span class="stat-value" id="stat-change">0.00%</span>
                </div>
            </div>

            <div class="separator"></div>

            <div class="indicators-panel">
                <div class="stats-title">指标</div>
                <button class="indicator-btn" id="indicator-ema">EMA (20) <span>📊</span></button>
            </div>
            
            <div class="separator"></div>
            
            <div class="price-settings-panel">
                <div class="stats-title">价格轴设置</div>
                
                <!-- 价格模式 -->
                <div class="setting-row">
                    <span class="setting-label">价格模式</span>
                    <select class="setting-select" id="price-mode">
                        <option value="0">Normal (线性)</option>
                        <option value="1">Logarithmic (对数)</option>
                        <option value="2">Percentage (百分比)</option>
                        <option value="3">IndexedTo100 (指数)</option>
                    </select>
                </div>
                
                <!-- 价格轴边距 -->
                <div class="setting-row">
                    <span class="setting-label">上边距</span>

                <div class="setting-row">
                    <span class="setting-label">下边距</span>
                    <input type="range" class="setting-range" id="scale-margin-bottom" min="0" max="0.5" step="0.01" value="0.1">
                    <span class="setting-value" id="scale-margin-bottom-value">0.10</span>
                </div>
                
                <!-- 反转价格轴 -->
                <div class="setting-row">
                    <span class="setting-label">反转价格轴</span>
                    <label class="toggle-switch">

                        <span class="toggle-slider"></span>

        </div>

        <div class="footer-center">

                <button class="playback-btn" id="playback-step-back" title="后退">◀</button>
                <button class="playback-btn" id="playback-play" title="播放/暂停">▶</button>

                    <option value="20">20x</option>
                </select>
            </div>
            <div class="date-selector" style="margin-left: 20px;">
                <label for="playback-date">从:</label>
                <input type="date" id="playback-date">
